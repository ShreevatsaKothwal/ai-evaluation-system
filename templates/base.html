{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>IntelliGrade</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar">

    <!-- LEFT -->
    <div class="nav-left">
        <a href="/" class="logo">IntelliGrade</a>
    </div>

    <!-- CENTER -->
    {% if user.is_authenticated %}
    <div class="nav-center">
        <a href="{% url 'student_dashboard' %}" class="nav-link">
            Dashboard
        </a>

        {% if user.is_staff %}
        <a href="{% url 'configure_dashboard' %}" class="nav-link">
            Configure
        </a>
        {% endif %}
    </div>
    {% endif %}

    <!-- RIGHT -->
    <div class="nav-right">
        {% if user.is_authenticated %}
            <span class="welcome-text">
                Welcome, {{ user.username }}
            </span>
            <a href="{% url 'logout' %}" class="btn-outline">
                Logout
            </a>
        {% else %}
            <a href="{% url 'login' %}" class="btn-outline">
                Login
            </a>
            <a href="{% url 'register' %}" class="btn-outline">
                Register
            </a>
        {% endif %}
    </div>

</nav>

{% block content %}
{% endblock %}

</body>
</html>
