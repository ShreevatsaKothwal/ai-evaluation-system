{% extends "base.html" %}
{% block content %}

<div style="min-height:80vh; display:flex; align-items:center; justify-content:center;">

    <div style="
        background:#1e293b;
        padding:40px;
        width:400px;
        border-radius:20px;
        box-shadow:0 20px 40px rgba(0,0,0,0.5);
        color:white;
    ">

        <h2 style="margin-bottom:25px; text-align:center;">
            Edit Exam
        </h2>

        <form method="POST">
            {% csrf_token %}

            <div style="margin-bottom:20px;">
                <label>Exam Name</label><br>
                <input type="text" name="name" value="{{ exam.name }}" required
                       style="width:100%; padding:10px; border-radius:8px; border:none; margin-top:6px;">
            </div>

            <div style="margin-bottom:25px;">
                <label>Total Marks</label><br>
                <input type="number" name="total_marks" value="{{ exam.total_marks }}" required
                       style="width:100%; padding:10px; border-radius:8px; border:none; margin-top:6px;">
            </div>

            <button type="submit" style="
                width:100%;
                padding:12px;
                border:none;
                border-radius:10px;
                background:#3b82f6;
                color:white;
                font-weight:600;
                cursor:pointer;
            ">
                Update Exam
            </button>

        </form>

    </div>

</div>

{% endblock %}
