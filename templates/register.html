{% extends "base.html" %}
{% block content %}

<div class="auth-wrapper">
    <div class="auth-card">

        <h2>Create Account</h2>

        <form method="POST">
            {% csrf_token %}

            {{ form.username }}
            {{ form.email }}
            {{ form.password1 }}
            {{ form.password2 }}

            <button type="submit" class="btn-primary full-width">
                Register
            </button>
        </form>

        <p class="auth-switch">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </p>

    </div>
</div>

{% endblock %}
